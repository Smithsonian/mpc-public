version: 2

build:
  os: ubuntu-22.04
  tools:
    python: "3.11"
  commands:
    - pip install -e ${READTHEDOCS_REPOSITORY_PATH}/mpc-client
    - pip install pandas mkdocs mkdocs-material "mkdocstrings[python]" mkdocs-jupyter
    - cd ${READTHEDOCS_REPOSITORY_PATH}/mpc-client && mkdocs build --site-dir $READTHEDOCS_OUTPUT/html
