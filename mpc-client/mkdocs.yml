site_name: mpc_client
site_url: https://mpc-client.readthedocs.io/
repo_url: https://github.com/Smithsonian/mpc-public
repo_name: Smithsonian/mpc-public

theme:
  name: material
  features:
    - navigation.top
    - content.code.copy
    - search.highlight

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            docstring_style: numpy
            show_source: true
            show_root_heading: true
            show_root_full_path: false
            members_order: source
            merge_init_into_class: true
            inherited_members: true
            show_if_no_docstring: false
            filters: ["!^_"]
            separate_signature: true
            show_signature_annotations: true
  - mkdocs-jupyter:
      execute: false
      include_source: true

nav:
  - Home: index.md
  - API Reference: api-reference.md
  - Tutorial: tutorials/mpc_tutorial_mpcapi.ipynb
  - Contributing: contributing.md

markdown_extensions:
  - admonition
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.superfences
