name: mpc-orb-testpypi

on:
  push:
    branches-ignore: [main]
    paths:
      - "mpc_orb/**"
      - ".github/workflows/mpc_orb-python-testpypi.yml"

jobs:

  build-wheels:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Append dev version suffix
        shell: bash
        run: |
          cd mpc_orb
          # Append .devN to the version so each build is unique on TestPyPI
          sed -i.bak "s/^version = \"\\(.*\\)\"/version = \"\\1.dev${{ github.run_number }}\"/" pyproject.toml
          echo "Version set to:"
          grep '^version' pyproject.toml

      - name: Build wheels
        uses: pypa/cibuildwheel@v2.21
        with:
          package-dir: mpc_orb
        env:
          CIBW_BUILD: "cp312-*"
          CIBW_SKIP: "*-musllinux_*"

      - name: Upload wheels as artifact
        uses: actions/upload-artifact@v4
        with:
          name: testpypi-wheels-${{ matrix.os }}
          path: wheelhouse/*.whl

  build-sdist:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Append dev version suffix
        run: |
          cd mpc_orb
          sed -i "s/^version = \"\\(.*\\)\"/version = \"\\1.dev${{ github.run_number }}\"/" pyproject.toml
          echo "Version set to:"
          grep '^version' pyproject.toml

      - name: Build source distribution
        run: |
          cd mpc_orb
          pip install build
          python -m build --sdist 

      - name: Upload sdist as artifact
        uses: actions/upload-artifact@v4
        with:
          name: testpypi-sdist
          path: mpc_orb/dist/*.tar.gz

  publish:
    needs: [build-wheels, build-sdist]
    runs-on: ubuntu-latest
    environment: testpypi
    permissions:
      id-token: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: testpypi-*
          path: dist
          merge-multiple: true

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          packages-dir: dist/
