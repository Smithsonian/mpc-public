name: mpc-orb-testpypi

on:
  push:
    branches-ignore: [main]
    paths:
      - "mpc_orb/**"
      - ".github/workflows/mpc_orb-python-testpypi.yml"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Append dev version suffix
        shell: bash
        run: |
          cd mpc_orb
          # Append .devN so each TestPyPI upload has a unique version.
          sed -i "s/^version = \"\\(.*\\)\"/version = \"\\1.dev${{ github.run_number }}\"/" pyproject.toml
          echo "Version set to:"
          grep '^version' pyproject.toml

      - name: Build distributions
        run: |
          cd mpc_orb
          python -m pip install --upgrade build
          python -m build

      - name: Upload distributions as artifact
        uses: actions/upload-artifact@v4
        with:
          name: testpypi-dist
          path: mpc_orb/dist/*

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: testpypi
    permissions:
      id-token: write

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: testpypi-dist
          path: dist

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          packages-dir: dist/
