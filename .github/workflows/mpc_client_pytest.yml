name: PyTest mpc_client

on:
  push:
    branches: [main]
    paths:
      - "mpc-client/**"
      - ".github/workflows/mpc_client_pytest.yml"
  pull_request:
    paths:
      - "mpc-client/**"
      - ".github/workflows/mpc_client_pytest.yml"

jobs:
  build:

    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        working-directory: ./mpc-client
        run: |
          python -m pip install --upgrade pip
          python -m pip install .[test]

      - name: Test mpc_client
        working-directory: ./mpc-client
        run: |
          pytest -v -s

      - name: Type check with mypy
        working-directory: ./mpc-client
        run: mypy src/mpc_client --ignore-missing-imports
