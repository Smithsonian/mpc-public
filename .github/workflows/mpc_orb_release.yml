name: mpc-orb-python-release

on:
  release:
    types: [published]

jobs:
  # Only run for mpc-orb releases (tags starting with "mpc-orb-v")
  check-tag:
    runs-on: ubuntu-latest
    outputs:
      is_mpc_orb: ${{ steps.check.outputs.is_mpc_orb }}
    steps:
      - name: Check release tag
        id: check
        run: |
          if [[ "${{ github.event.release.tag_name }}" == mpc-orb-v* ]]; then
            echo "is_mpc_orb=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_mpc_orb=false" >> "$GITHUB_OUTPUT"
          fi

  build:
    needs: check-tag
    if: needs.check-tag.outputs.is_mpc_orb == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build distributions
        run: |
          cd mpc_orb
          python -m pip install --upgrade build
          python -m build

      - name: Upload distributions as artifact
        uses: actions/upload-artifact@v4
        with:
          name: mpc-orb-dist
          path: mpc_orb/dist/*

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: mpc-orb-dist
          path: dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
